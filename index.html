<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    content="Yovel — Concierge Financeiro Global. Desbloqueie uma vida sem fronteiras com câmbio otimizado, acesso a salas VIP e estratégias exclusivas de viagem." />
  <meta name="theme-color" content="#070A12" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Open Graph -->
  <meta property="og:title" content="Yovel — Concierge Financeiro Global" />
  <meta property="og:description"
    content="Desbloqueie uma vida sem fronteiras com câmbio otimizado, acesso a salas VIP e estratégias exclusivas de viagem." />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="pt_BR" />
  <meta property="og:image" content="/hero_night_sky.jpg" />

  <!-- Preload critical fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@700;800;900&family=Space+Grotesk:wght@500;600;700&display=swap" />

  <!-- Preload LCP hero image -->
  <link rel="preload" as="image" href="/hero_night_sky.jpg" fetchpriority="high" />

  <link rel="icon" type="image/svg+xml" href="/assets/logo_yovel.svg" />
  <title>Yovel — Concierge Financeiro Global</title>

  <!-- Structured Data (Organization) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FinancialService",
      "name": "Yovel",
      "description": "Concierge Financeiro Global — Câmbio otimizado, acesso a salas VIP e estratégias exclusivas de viagem para cidadãos globais.",
      "url": "https://yovel.com.br",
      "logo": "/assets/logo_yovel.svg",
      "founder": {
        "@type": "Person",
        "name": "Matheus Melo"
      },
      "areaServed": "BR",
      "serviceType": ["Câmbio Otimizado", "Concierge de Viagem", "Consultoria Financeira"],
      "priceRange": "R$ 250+"
    }
    </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
